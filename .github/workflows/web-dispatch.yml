name: 网站触发刷步

on:
  workflow_dispatch:
    inputs:
      phone:
        description: '手机号或邮箱'
        required: true
      password:
        description: '密码'
        required: true
      step:
        description: '目标步数(0=随机)'
        required: false
        default: '0'
      min_step:
        description: '最小步数(随机模式)'
        required: false
        default: '18000'
      max_step:
        description: '最大步数(随机模式)'
        required: false
        default: '25000'

jobs:
  step:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 执行刷步
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          STEP: ${{ github.event.inputs.step }}
          MIN_STEP: ${{ github.event.inputs.min_step }}
          MAX_STEP: ${{ github.event.inputs.max_step }}
        run: |
          pip3 install pycryptodome requests pytz
          python3 - <<'PYEOF'
          import os, sys, random, uuid, time, json, requests

          sys.path.insert(0, '.')
          from util import zepp_helper

          phone = os.environ['PHONE']
          password = os.environ['PASSWORD']
          step_env = os.environ.get('STEP', '0').strip()

          if step_env and step_env != '0':
              step = int(step_env)
          else:
              min_s = int(os.environ['MIN_STEP'])
              max_s = int(os.environ['MAX_STEP'])
              step = random.randint(min_s, max_s)

          is_phone = phone.startswith('+86') or (not '@' in phone)

          # Step 1: 登录
          print(f"::group::登录 {phone}")
          access_code, err = zepp_helper.login_access_token(phone, password)
          if access_code is None:
              print(f"::error::登录失败: {err}")
              exit(1)
          print("::endgroup::")

          # Step 2: 获取 token
          print(f"::group::获取token")
          phone_did = str(uuid.uuid4())
          login_token, app_token, user_id, err = zepp_helper.grant_login_tokens(access_code, phone_did, is_phone)
          if login_token is None:
              print(f"::error::获取token失败: {err}")
              exit(1)
          print(f"user_id={user_id}")
          print("::endgroup::")

          # Step 3: 绑定虚拟手环 (关键！抓包确认的API)
          print(f"::group::绑定虚拟手环")
          mac = ':'.join([f"{random.randint(0,255):02X}" for _ in range(6)])
          r = uuid.uuid4()
          app_time = int(time.time() * 1000)
          bind_url = "https://api-mifit-cn3.zepp.com/v1/device/binds.json"
          bind_params = {
              "r": str(r),
              "app_time": str(app_time),
              "productVersion": "-1",
              "brandType": "-1",
              "code": "0",
              "productId": "-1",
              "activeStatus": "-1",
              "bind_timezone": "32",
              "device_source": "262",
              "device_type": "0",
              "crcedUserId": "0",
              "userid": user_id,
              "appid": "428135909242707968",
              "auth_key": "",
              "brand": "Xiaomi",
              "channel": "Normal",
              "country": "CN",
              "cv": "50847_6.16.1",
              "device": "android_36",
              "deviceid": "",
              "displayName": "",
              "enableMultiDevice": "true",
              "fw_hr_version": "",
              "fw_version": "",
              "hardwareVersion": "",
              "lang": "zh_CN",
              "mac": mac,
              "sn": "",
              "soft_version": "",
              "sys_model": "24072PX77C",
              "sys_version": "Android_16",
              "timezone": "Asia/Shanghai",
              "v": "2.0",
          }
          bind_headers = {
              "apptoken": app_token,
              "User-Agent": "MiFit6.16.1 (24072PX77C; Android 16; Density/3.0)",
              "appplatform": "android_phone",
              "appname": "com.xiaomi.hm.health",
              "X-Request-Id": str(uuid.uuid4()),
              "cv": "50847_6.16.1",
              "v": "2.0",
              "lang": "zh_CN",
              "country": "CN",
              "channel": "Normal",
              "timezone": "Asia/Shanghai",
              "clientId": "428135909242707968",
          }
          resp = requests.get(bind_url, params=bind_params, headers=bind_headers, timeout=15)
          print(f"MAC={mac} status={resp.status_code}")
          print(f"Response: {resp.text[:500]}")
          if resp.status_code == 200:
              try:
                  rj = resp.json()
                  if rj.get('code') == 1 or rj.get('message') == 'success':
                      print("✅ 虚拟手环绑定成功！")
              except:
                  pass
          print("::endgroup::")

          # Step 4: 提交步数
          print(f"::group::设置步数 {step}")
          ok, msg = zepp_helper.post_fake_brand_data(str(step), app_token, user_id)
          if ok:
              print(f"✅ 成功！步数设置为 {step} [{msg}]")
          else:
              print(f"❌ 失败: {msg}")
              exit(1)
          print("::endgroup::")
          PYEOF
