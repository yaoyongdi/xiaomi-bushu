name: 网站触发刷步

on:
  workflow_dispatch:
    inputs:
      phone:
        description: '手机号或邮箱'
        required: true
      password:
        description: '密码'
        required: true
      step:
        description: '目标步数(0=随机)'
        required: false
        default: '0'
      min_step:
        description: '最小步数(随机模式)'
        required: false
        default: '18000'
      max_step:
        description: '最大步数(随机模式)'
        required: false
        default: '25000'

jobs:
  step:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 执行刷步
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          STEP: ${{ github.event.inputs.step }}
          MIN_STEP: ${{ github.event.inputs.min_step }}
          MAX_STEP: ${{ github.event.inputs.max_step }}
        run: |
          pip3 install pycryptodome requests pytz
          python3 - <<'PYEOF'
          import os, sys, random, uuid, time as _time, json, requests

          sys.path.insert(0, '.')
          from util import zepp_helper

          phone = os.environ['PHONE']
          password = os.environ['PASSWORD']
          step_env = os.environ.get('STEP', '0').strip()

          if step_env and step_env != '0':
              step = int(step_env)
          else:
              min_s = int(os.environ['MIN_STEP'])
              max_s = int(os.environ['MAX_STEP'])
              step = random.randint(min_s, max_s)

          device_id = str(uuid.uuid4())
          is_phone = phone.startswith('+86') or (not '@' in phone)

          print(f"::group::登录 {phone}")
          access_code, err = zepp_helper.login_access_token(phone, password)
          if access_code is None:
              print(f"::error::登录失败: {err}")
              exit(1)
          print("::endgroup::")

          print("::group::获取token")
          login_token, app_token, user_id, err = zepp_helper.grant_login_tokens(access_code, device_id, is_phone)
          if login_token is None:
              print(f"::error::获取token失败: {err}")
              exit(1)
          print(f"user_id: {user_id}")
          print("::endgroup::")

          # 提交步数（device_type=1 模拟手环设备）
          print(f"::group::设置步数 {step}")
          t = str(int(_time.time() * 1000))
          now_ts = int(_time.time())

          data_json = {
              "data": [{
                  "date_time": now_ts,
                  "source": 24,
                  "active": 0,
                  "total": step,
                  "calories": 0,
                  "distance": 0,
                  "data_type": 1,
                  "step_type": 1,
              }],
              "total": step,
          }
          data_json_str = json.dumps(data_json)

          url = f'https://api-mifit-cn.huami.com/v1/data/band_data.json?&t={t}&r={uuid.uuid4()}'
          head = {
              "apptoken": app_token,
              "Content-Type": "application/x-www-form-urlencoded"
          }
          # device_type=1=手环, last_deviceid用登录时的device_id
          data = f'userid={user_id}&last_sync_data_time={now_ts}&device_type=1&last_deviceid={device_id}&data_json={data_json_str}'

          resp = requests.post(url, data=data, headers=head, timeout=20)
          if resp.status_code != 200:
              print(f"::error::请求异常: {resp.status_code}")
              exit(1)
          result = resp.json()
          print(f"Result: {json.dumps(result)}")
          if result.get("message") == "success" or result.get("code") == 0:
              print(f"✅ 成功！步数设置为 {step}")
          else:
              print(f"❌ 失败: {json.dumps(result)}")
              exit(1)
          print("::endgroup::")
          PYEOF
