name: 网站触发刷步

on:
  workflow_dispatch:
    inputs:
      phone:
        description: '手机号或邮箱'
        required: true
      password:
        description: '密码'
        required: true
      step:
        description: '目标步数(0=随机)'
        required: false
        default: '0'
      min_step:
        description: '最小步数(随机模式)'
        required: false
        default: '18000'
      max_step:
        description: '最大步数(随机模式)'
        required: false
        default: '25000'

jobs:
  step:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 执行刷步
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          STEP: ${{ github.event.inputs.step }}
          MIN_STEP: ${{ github.event.inputs.min_step }}
          MAX_STEP: ${{ github.event.inputs.max_step }}
        run: |
          pip3 install pycryptodome requests pytz
          python3 - <<'PYEOF'
          import os, sys, random, uuid, time, json, requests

          sys.path.insert(0, '.')
          from util import zepp_helper

          phone = os.environ['PHONE']
          password = os.environ['PASSWORD']
          step_env = os.environ.get('STEP', '0').strip()

          if step_env and step_env != '0':
              step = int(step_env)
          else:
              min_s = int(os.environ['MIN_STEP'])
              max_s = int(os.environ['MAX_STEP'])
              step = random.randint(min_s, max_s)

          is_phone = phone.startswith('+86') or (not '@' in phone)

          # Step 1: 登录
          print(f"::group::登录 {phone}")
          access_code, err = zepp_helper.login_access_token(phone, password)
          if access_code is None:
              print(f"::error::登录失败: {err}")
              exit(1)
          print("::endgroup::")

          # Step 2: 注册手机设备
          phone_did = str(uuid.uuid4())
          print(f"::group::注册手机设备")
          login_token, app_token, user_id, err = zepp_helper.grant_login_tokens(access_code, phone_did, is_phone)
          if login_token is None:
              print(f"::error::获取token失败: {err}")
              exit(1)
          print(f"user_id={user_id} app_token={app_token[:10]}...")
          print("::endgroup::")

          # Step 3: 注册虚拟手环（用 grant_login_tokens 但改 device_model）
          band_did = str(uuid.uuid4())
          print(f"::group::注册虚拟手环")
          band_headers = {
              "app_name": "com.xiaomi.hm.health",
              "x-request-id": f"{uuid.uuid4()}",
              "accept-language": "zh-CN",
              "appname": "com.xiaomi.hm.health",
              "cv": "50818_6.14.0",
              "v": "2.0",
              "appplatform": "android_phone",
              "content-type": "application/x-www-form-urlencoded; charset=UTF-8",
          }
          band_data = {
              "allow_registration=": "false",
              "app_name": "com.xiaomi.hm.health",
              "app_version": "6.14.0",
              "code": access_code,
              "country_code": "CN",
              "device_id": band_did,
              "device_model": "MIBAND7",
              "dn": "account.zepp.com,api-user.zepp.com,api-mifit.zepp.com,api-watch.zepp.com,app-analytics.zepp.com,api-analytics.huami.com,auth.zepp.com",
              "grant_type": "access_token",
              "lang": "zh_CN",
              "os_version": "1.5.0",
              "source": "com.xiaomi.hm.health:6.14.0:50818",
              "third_name": "band",
          }
          resp = requests.post(
              "https://account.huami.com/v2/client/login",
              data=band_data,
              headers=band_headers,
              timeout=15
          )
          print(f"Band reg status={resp.status_code}")
          if resp.status_code == 200:
              r = resp.json()
              ti = r.get('token_info', {})
              if ti.get('app_token'):
                  app_token = ti['app_token']
                  user_id = ti.get('user_id', user_id)
                  print(f"✅ 手环注册成功")
              else:
                  print(f"Reg response: {json.dumps(r, ensure_ascii=False)[:300]}")
          else:
              print(f"Response: {resp.text[:300]}")
          print("::endgroup::")

          # Step 4: 提交步数
          print(f"::group::设置步数 {step}")
          ok, msg = zepp_helper.post_fake_brand_data(str(step), app_token, user_id)
          if ok:
              print(f"✅ 成功！步数设置为 {step} [{msg}]")
          else:
              print(f"❌ 失败: {msg}")
              exit(1)
          print("::endgroup::")
          PYEOF
