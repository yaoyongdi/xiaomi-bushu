          }
          data = f'userid={user_id}&last_sync_data_time=1597306380&device_type=0&last_deviceid={deviceid}&data_json={data_json}'
          resp = requests.post(url, data=data, headers=headers, timeout=15)
          print(f"  HTTP={resp.status_code} 响应={resp.text[:300]}")
          if resp.status_code == 200 and '"message":"success"' in resp.text:
              print(f"✅ 成功！步数设置为 {step} (deviceid={deviceid})")
          else:
              print(f"❌ 失败: {resp.text[:200]}")
              exit(1)
          print("::endgroup::")
