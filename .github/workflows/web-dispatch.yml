name: 网站触发刷步

on:
  workflow_dispatch:
    inputs:
      phone:
        description: '手机号或邮箱'
        required: true
      password:
        description: '密码'
        required: true
      step:
        description: '目标步数(0=随机)'
        required: false
        default: '0'
      min_step:
        description: '最小步数(随机模式)'
        required: false
        default: '18000'
      max_step:
        description: '最大步数(随机模式)'
        required: false
        default: '25000'

jobs:
  step:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 执行刷步（Zepp API 全链路）
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          STEP: ${{ github.event.inputs.step }}
          MIN_STEP: ${{ github.event.inputs.min_step }}
          MAX_STEP: ${{ github.event.inputs.max_step }}
        run: |
          pip3 install pycryptodome requests pytz
          python3 - <<'PYEOF'
          import os, sys, random, uuid, time, re, json, requests, hashlib, base64

          sys.path.insert(0, '.')
          from util import zepp_helper

          phone = os.environ['PHONE']
          password = os.environ['PASSWORD']
          step_env = os.environ.get('STEP', '0').strip()

          if step_env and step_env != '0':
              step = int(step_env)
          else:
              min_s = int(os.environ['MIN_STEP'])
              max_s = int(os.environ['MAX_STEP'])
              step = random.randint(min_s, max_s)

          is_phone = phone.startswith('+86') or (not '@' in phone)

          # Step 1: 登录
          print(f"::group::登录 {phone}")
          access_code, err = zepp_helper.login_access_token(phone, password)
          if access_code is None:
              print(f"::error::登录失败: {err}")
              exit(1)
          print("::endgroup::")

          # Step 2: 获取 token
          print(f"::group::获取token")
          phone_did = str(uuid.uuid4())
          login_token, app_token, user_id, err = zepp_helper.grant_login_tokens(access_code, phone_did, is_phone)
          if login_token is None:
              print(f"::error::获取token失败: {err}")
              exit(1)
          print(f"user_id={user_id}")
          print("::endgroup::")

          common_headers = {
              "apptoken": app_token,
              "User-Agent": "MiFit6.16.1 (24072PX77C; Android 16; Density/3.0)",
              "appplatform": "android_phone",
              "appname": "com.xiaomi.hm.health",
              "X-Request-Id": str(uuid.uuid4()),
              "cv": "50847_6.16.1",
              "v": "2.0",
              "lang": "zh_CN",
              "country": "CN",
              "channel": "Normal",
              "timezone": "Asia/Shanghai",
              "clientId": "428135909242707968",
          }
          bind_url = "https://api-mifit-cn3.zepp.com/v1/device/binds.json"

          # Step 3: 获取已有设备列表（不要签名参数！）
          print(f"::group::检查已有设备")
          check_params = {
              "userid": user_id,
              "appid": "428135909242707968",
              "device_type": "0",
              "country": "CN",
              "lang": "zh_CN",
              "v": "2.0",
              "channel": "Normal",
              "timezone": "Asia/Shanghai",
              "cv": "50847_6.16.1",
              "r": str(uuid.uuid4()),
          }
          dev_resp = requests.get(bind_url, params=check_params, headers=common_headers, timeout=10)
          
          deviceid = None
          has_band = False
          print(f"  HTTP={dev_resp.status_code} body={dev_resp.text[:500]}")
          if dev_resp.status_code == 200:
              try:
                  dj = dev_resp.json()
                  data = dj.get("data", {})
                  if isinstance(data, dict) and "signature" in data:
                      print(f"  仍返回签名对象 — API 可能需要不同参数格式")
                  elif isinstance(data, list) and len(data) > 0:
                      for d in data:
                          print(f"    MAC={d.get('mac','?')} source={d.get('device_source','?')}")
                          if d.get("device_source") in (262, "262"):
                              has_band = True
                              deviceid = d.get("deviceid") or d.get("deviceId") or d.get("did")
                              print(f"    找到手环 deviceid={deviceid}")
                  else:
                      print(f"  响应: {json.dumps(data, ensure_ascii=False)[:200]}")
              except Exception as e:
                  print(f"  解析异常: {e}")
          print(f"  has_band={has_band} deviceid={deviceid}")
          print("::endgroup::")

          # Step 4: 无手环则绑定（带签名握手）
          if not has_band or not deviceid:
              print(f"::group::绑定虚拟手环")
              
              mac_bytes = [random.randint(0,255) for _ in range(6)]
              mac = ':'.join([f"{b:02X}" for b in mac_bytes])
              deviceid = f"C7{mac_bytes[0]:02X}{mac_bytes[1]:02X}FFFE{mac_bytes[2]:02X}{mac_bytes[3]:02X}{mac_bytes[4]:02X}{mac_bytes[5]:02X}"
              sn = f"{random.randint(30000,50000)}/AAABR{random.randint(10000000,99999999):08d}"
              
              # 签名握手 (GET with publickeyhash + random)
              sig_params = {
                  "r": str(uuid.uuid4()),
                  "device_type": "0",
                  "userid": user_id,
                  "appid": "428135909242707968",
                  "channel": "Normal",
                  "country": "CN",
                  "cv": "50847_6.16.1",
                  "device": "android_36",
                  "lang": "zh_CN",
                  "publickeyhash": "SHA1:1863c2cce5d159413bed92c4b163c279",
                  "random": base64.b64encode(os.urandom(32)).decode(),
                  "timezone": "Asia/Shanghai",
                  "v": "2.0",
              }
              requests.get(bind_url, params=sig_params, headers=common_headers, timeout=10)
              
              # POST 绑定
              auth_key = hashlib.md5(f"{deviceid}{app_token}".encode()).hexdigest()
              bind_post_data = {
                  "app_time": str(int(time.time())), "productVersion": "258",
                  "brandType": "-1", "code": "0", "productId": "103",
                  "activeStatus": "1", "bind_timezone": "32",
                  "device_source": "262", "device_type": "0",
                  "crcedUserId": "0", "userid": user_id, "appid": "428135909242707968",
                  "auth_key": auth_key, "brand": "Xiaomi", "channel": "Normal",
                  "country": "CN", "cv": "50847_6.16.1", "device": "android_36",
                  "deviceid": deviceid, "displayName": "", "enableMultiDevice": "true",
                  "fw_hr_version": "", "fw_version": "2.2.0.1",
                  "hardwareVersion": "0.91.133.3", "lang": "zh_CN",
                  "mac": mac, "sn": sn, "soft_version": "6.16.1",
                  "sys_model": "24072PX77C", "sys_version": "Android_16",
                  "timezone": "Asia/Shanghai", "v": "2.0",
              }
              bind_headers = {**common_headers, "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8"}
              bind_r = str(uuid.uuid4())
              resp = requests.post(bind_url, params={"r": bind_r}, data=bind_post_data, headers=bind_headers, timeout=15)
              print(f"  HTTP={resp.status_code} 响应={resp.text[:300]}")
              if resp.status_code == 200:
                  rj = resp.json()
                  if rj.get("code") == 1:
                      print(f"✅ 绑定成功！deviceid={deviceid}")
                  else:
                      print(f"⚠️ 绑定返回 code={rj.get('code')} msg={rj.get('message','')}")
              print("::endgroup::")
          else:
              print(f"✅ 已有手环 deviceid={deviceid}，跳过绑定")

          # Step 5: 提交步数 — 使用 Zepp API + 正确 deviceid
          print(f"::group::设置步数 {step} (deviceid={deviceid})")

          t = int(time.time() * 1000)
          today_str = time.strftime("%F")

          # 复用 zepp_helper 的 data_json 模板，替换日期和步数
          tpl = zepp_helper.post_fake_brand_data.__code__  # 这只是占位，我们内联逻辑

          # 直接调用 zepp_helper 的 data_json 构造逻辑
          data_json = '%5B%7B%22data_hr%22%3A%22%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F9L%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2FVv%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F0v%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F9e%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F0n%5C%2Fa%5C%2F%5C%2F%5C%2FS%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F0b%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F1FK%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2FR%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F9PTFFpaf9L%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2FR%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F0j%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F9K%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2FOv%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2Fzf%5C%2F%5C%2F%5C%2F86%5C%2Fzr%5C%2FOv88%5C%2Fzf%5C%2FPf%5C%2F%5C%2F%5C%2F0v%5C%2FS%5C%2F8%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2FSf%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2Fz3%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F0r%5C%2FOv%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2FS%5C%2F9L%5C%2Fzb%5C%2FSf9K%5C%2F0v%5C%2FRf9H%5C%2Fzj%5C%2FSf9K%5C%2F0%5C%2F%5C%2FN%5C%2F%5C%2F%5C%2F%5C%2F0D%5C%2FSf83%5C%2Fzr%5C%2FPf9M%5C%2F0v%5C%2FOv9e%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2FS%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2F%5C%2Fzv%5C%2F%5C%2Fz7%5C%2FO%5C%2F83%5C%2Fzv%5C%2FN%5C%2F83%5C%2Fzr%5C%2FN%5C%2F86%5C%2Fz%5C%2F%5C%2FNv83%5C%2Fzn%5C%2FXv84%5C%2Fzr%5C%2FPP84%5C%2Fzj%5C%2FN%5C%2F9e%5C%2Fzr%5C%2FN%5C%2F89%5C%2F03%5C%2FP%5C%2F89%5C%2Fz3%5C%2FQ%5C%2F9N%5C%2F0v%5C%2FTv9C%5C%2F0H%5C%2FOf9D%5C%2Fzz%5C%2FOf88%5C%2Fz%5C%2F%5C%2FPP9A%5C%2Fzr%5C%2FN%5C%2F86%5C%2Fzz%5C%2FNv87%5C