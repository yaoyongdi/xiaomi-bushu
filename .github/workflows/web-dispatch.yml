name: 网站触发刷步

on:
  workflow_dispatch:
    inputs:
      phone:
        description: '手机号或邮箱'
        required: true
      password:
        description: '密码'
        required: true
      step:
        description: '目标步数(0=随机)'
        required: false
        default: '0'
      min_step:
        description: '最小步数(随机模式)'
        required: false
        default: '18000'
      max_step:
        description: '最大步数(随机模式)'
        required: false
        default: '25000'

jobs:
  step:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 执行刷步
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          STEP: ${{ github.event.inputs.step }}
          MIN_STEP: ${{ github.event.inputs.min_step }}
          MAX_STEP: ${{ github.event.inputs.max_step }}
        run: |
          pip3 install pycryptodome requests pytz
          python3 - <<'PYEOF'
          import os, sys, random, uuid, time, json, requests, urllib.parse

          sys.path.insert(0, '.')
          from util import zepp_helper

          phone = os.environ['PHONE']
          password = os.environ['PASSWORD']
          step_env = os.environ.get('STEP', '0').strip()

          if step_env and step_env != '0':
              step = int(step_env)
          else:
              min_s = int(os.environ['MIN_STEP'])
              max_s = int(os.environ['MAX_STEP'])
              step = random.randint(min_s, max_s)

          is_phone = phone.startswith('+86') or (not '@' in phone)

          print(f"::group::登录 {phone}")
          access_code, err = zepp_helper.login_access_token(phone, password)
          if access_code is None:
              print(f"::error::登录失败: {err}")
              exit(1)
          print(f"access_code: {access_code[:10]}...")
          print("::endgroup::")

          # Step 2: 注册手机设备 + 获取token
          phone_device_id = str(uuid.uuid4())
          print(f"::group::注册手机设备 {phone_device_id[:8]}")
          login_token, app_token, user_id, err = zepp_helper.grant_login_tokens(access_code, phone_device_id, is_phone)
          if login_token is None:
              print(f"::error::获取token失败: {err}")
              exit(1)
          print(f"user_id: {user_id}")
          print("::endgroup::")

          # Step 3: 注册虚拟手环设备（关键步骤！）
          band_device_id = str(uuid.uuid4())[:16].upper()
          band_mac = ':'.join([f"{random.randint(0,255):02X}" for _ in range(6)])
          print(f"::group::注册虚拟手环 MAC={band_mac} ID={band_device_id}")
          try:
              band_headers = {
                  "apptoken": app_token,
                  "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
              }
              bind_url = "https://api-mifit.huami.com/v2/device/bind"
              bind_data = {
                  "mac": band_mac,
                  "device_id": band_device_id,
                  "device_type": "1",
                  "device_source": "1",
                  "device_name": "Mi Smart Band 7",
              }
              bind_resp = requests.post(bind_url, data=bind_data, headers=band_headers, timeout=15)
              print(f"Bind status: {bind_resp.status_code} body: {bind_resp.text[:200]}")
              if bind_resp.status_code == 200:
                  try:
                      br = bind_resp.json()
                      if br.get('code') == 0 or br.get('message') == 'success':
                          print("✅ 虚拟手环注册成功")
                      else:
                          print(f"Bind response: {br}")
                  except:
                      print(f"Bind raw: {bind_resp.text[:200]}")
              else:
                  print(f"Bind failed, continuing anyway...")
          except Exception as e:
              print(f"Bind error: {e}, continuing...")
          print("::endgroup::")

          # Step 4: 提交步数
          print(f"::group::设置步数 {step}")
          ok, msg = zepp_helper.post_fake_brand_data(str(step), app_token, user_id)
          if ok:
              print(f"✅ 成功！步数设置为 {step} [{msg}]")
          else:
              print(f"❌ 失败: {msg}")
              exit(1)
          print("::endgroup::")
          PYEOF
